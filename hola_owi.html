<!DOCTYPE html>
        <html>
        <head>
            <meta charset='utf-8'>
            <title>OWI</title>
            <style>
                body {
                    background: #0d0d0d;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    height: 100vh;
                    margin: 0;
                    flex-direction: column;
                }
                h1 {
                    color: #00ff99;
                    font-family: monospace;
                    font-size: 5rem;
                    animation: glow 2s infinite alternate;
                    margin: 0;
                }
                p {
                    color: #555;
                    font-family: monospace;
                    margin-top: 1rem;
                }
                @keyframes glow {
                    from { text-shadow: 0 0 10px #00ff99; }
                    to   { text-shadow: 0 0 40px #00ff99, 0 0 80px #00ff99; }
                }
            </style>
        </head>
        <body>
            <h1>Hola!</h1>
            <p>hecho con OWI 🚀</p>
        </body>
        </html>
